apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardshield-backend-deployment
  namespace: enterprise-demo
  labels:
    app: guardshield-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: guardshield-api
  template:
    metadata:
      labels:
        app: guardshield-api
    spec:
      containers:
      - name: api-container
        image: guardshield-registry.internal/backend:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "250m"
            memory: 512Mi
        envFrom:
        - configMapRef:
            name: guardshield-runtime-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: guardshield-credentials
              key: DATABASE_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: guardshield-credentials
              key: OPENAI_API_KEY
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10